<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project detail — TPA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#F0F4FF; --surface:#FFFFFF; --surface2:#EBF0FF; --surface3:#DCE5FF;
    --border:rgba(0,60,200,0.08); --border-md:rgba(0,60,200,0.13); --border-strong:rgba(0,60,200,0.20);
    --text:#0A0F2E; --text-2:#3A4270; --text-3:#7A84B0;
    --accent:#0057FF; --accent-2:rgba(0,87,255,0.10);
    --navy:#0A0F2E; --navy-2:#131830; --navy-3:#1D2440; --navy-4:#273054;
    --g-fg:#006B47; --g-bg:#E6F5EE; --g-mid:#C8E8D8;
    --l-fg:#004FCC; --l-bg:#E8EFFF; --l-mid:#C0D4FF;
    --r-fg:#7A4800; --r-bg:#FFF2DC; --r-mid:#FFE0A0;
    --b-fg:#B81518; --b-bg:#FFE8E8; --b-mid:#FFC8C8;
    --n-fg:#44496A; --n-bg:#EAECF1; --n-mid:#D4D8E8;
    --r:5px; --r-md:7px; --r-lg:10px; --r-xl:14px;
    --sh-sm:0 1px 3px rgba(10,15,35,0.06),0 1px 2px rgba(10,15,35,0.04);
    --sh-md:0 4px 16px rgba(10,15,35,0.08),0 2px 6px rgba(10,15,35,0.05);
    --sh-lg:0 12px 40px rgba(10,15,35,0.12),0 4px 12px rgba(10,15,35,0.07);
  }
  body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:13px; line-height:1.5; min-height:100vh; -webkit-font-smoothing:antialiased; }

  /* HEADER */
  .page-header { background:var(--navy); color:#fff; padding:0 1.25rem; display:flex; align-items:center; justify-content:space-between; height:44px; position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(255,255,255,0.05); gap:1rem; }
  .page-header .logo { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,0.35); white-space:nowrap; display:flex; align-items:center; gap:7px; }
  .logo-icon { width:18px; height:18px; background:var(--accent); border-radius:4px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .page-header .project-name { font-size:14px; font-weight:500; color:#fff; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .page-header .meta { font-size:11px; color:rgba(255,255,255,0.3); font-family:'DM Mono',monospace; white-space:nowrap; }
  .btn-back-detail { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; padding:3px 9px; border-radius:var(--r); border:1px solid rgba(255,255,255,0.09); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.42); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .12s; white-space:nowrap; }
  .btn-back-detail:hover { background:rgba(255,255,255,0.09); color:rgba(255,255,255,0.8); }

  /* MAIN */
  .main { max-width:900px; margin:0 auto; padding:1.125rem 1.5rem 4rem; }

  /* PROJECT INFO */
  .project-info { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:1rem 1.25rem; margin-bottom:1.125rem; display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.75rem; box-shadow:var(--sh-sm); }
  .info-item .info-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-3); margin-bottom:2px; }
  .info-item .info-val { font-size:13px; font-weight:500; color:var(--text); }

  /* MODE BAR */
  .mode-bar { display:flex; align-items:center; gap:.625rem; margin-bottom:1rem; padding:.5rem .875rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); }
  .mode-bar .mode-label { font-size:12px; color:var(--text-2); }
  .mode-pill { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; }
  .mode-pill.viewer { background:var(--l-bg); color:var(--l-fg); }
  .mode-pill.editor { background:var(--g-bg); color:var(--g-fg); }
  .mode-pill .dot { width:5px; height:5px; border-radius:50%; }
  .mode-pill.viewer .dot { background:var(--l-fg); }
  .mode-pill.editor .dot { background:var(--g-fg); }
  .saving-indicator { display:none; align-items:center; gap:4px; font-size:10px; color:var(--text-3); margin-left:auto; }
  .saving-indicator.show { display:flex; }
  .saving-dot { width:4px; height:4px; border-radius:50%; background:var(--text-3); animation:savepulse .5s ease-in-out infinite alternate; }
  @keyframes savepulse{to{opacity:.12}}

  /* PHASE SECTIONS */
  .fase-section { margin-bottom:.875rem; }
  .fase-section-header { display:flex; align-items:center; gap:7px; margin-bottom:.5rem; cursor:pointer; user-select:none; }
  .fase-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:2px 9px; border-radius:20px; }
  .collapse-icon { font-size:9px; color:var(--text-3); transition:transform .18s; }
  .fase-section-header.collapsed .collapse-icon { transform:rotate(-90deg); }
  .fase-section-body { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
  .fase-section-body.collapsed { display:none; }

  /* FIELD ROWS */
  .field-row { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:.5rem .75rem; display:flex; align-items:center; justify-content:space-between; gap:.625rem; min-height:38px; transition:background .08s; }
  .field-row.full-width { grid-column:1/-1; }
  .field-label { font-size:11px; color:var(--text-2); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .field-val { flex-shrink:0; text-align:right; }
  .mode-editor .field-row.editable { cursor:pointer; }
  .mode-editor .field-row.editable:hover { background:var(--surface2); }
  .mode-editor .field-row.editable:hover .badge,
  .mode-editor .field-row.editable:hover .janee-ja,
  .mode-editor .field-row.editable:hover .janee-nee,
  .mode-editor .field-row.editable:hover .janee-leeg,
  .mode-editor .field-row.editable:hover .date-val,
  .mode-editor .field-row.editable:hover .opmerking-tekst,
  .mode-editor .field-row.editable:hover .opmerking-leeg { outline:2px solid var(--accent); outline-offset:1px; }

  /* BADGES */
  .badge { display:inline-flex; align-items:center; gap:3px; font-size:9px; font-weight:700; padding:2px 7px; border-radius:20px; white-space:nowrap; letter-spacing:.04em; }
  .badge::before { content:''; width:4px; height:4px; border-radius:50%; flex-shrink:0; }
  .G { background:var(--g-bg); color:var(--g-fg); } .G::before{background:var(--g-fg);}
  .L { background:var(--l-bg); color:var(--l-fg); } .L::before{background:var(--l-fg);}
  .R { background:var(--r-bg); color:var(--r-fg); } .R::before{background:var(--r-fg);}
  .B { background:var(--b-bg); color:var(--b-fg); } .B::before{background:var(--b-fg);}
  .N { background:var(--n-bg); color:var(--n-fg); } .N::before{background:var(--n-fg);}
  .wk-over { color:var(--b-fg); font-weight:700; font-family:'DM Mono',monospace; font-size:11px; }
  .wk-warn { color:var(--r-fg); font-weight:600; font-family:'DM Mono',monospace; font-size:11px; }
  .wk-ok   { color:var(--g-fg); font-family:'DM Mono',monospace; font-size:11px; }
  .janee-ja  { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; background:var(--g-bg); color:var(--g-fg); }
  .janee-nee { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; background:var(--b-bg); color:var(--b-fg); }
  .janee-leeg{ display:inline-block; font-size:10px; padding:2px 8px; border-radius:20px; background:var(--n-bg); color:var(--text-3); }
  .date-val { font-size:11px; font-family:'DM Mono',monospace; color:var(--text-2); }
  .opmerking-tekst { font-size:11px; color:var(--text); background:#FFFBEB; border-radius:3px; padding:2px 6px; border-left:2px solid #D4880A; }
  .opmerking-leeg  { font-size:11px; font-style:italic; color:var(--text-3); }

  /* PICKERS */
  .status-picker,.date-popup { position:fixed; background:var(--surface); border:1px solid var(--border-md); border-radius:var(--r-lg); box-shadow:var(--sh-lg); z-index:500; padding:4px; display:none; }
  .status-picker.open { display:block; animation:popIn .1s ease; }
  @keyframes popIn{from{opacity:0;transform:scale(.95) translateY(-3px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .sp-header,.date-popup-header { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-3); padding:5px 7px 3px; }
  .status-option { display:flex; align-items:center; gap:7px; padding:5px 7px; border-radius:var(--r); cursor:pointer; font-size:11px; color:var(--text); transition:background .07s; }
  .status-option:hover,.status-option.active { background:var(--surface2); }
  .sdot { width:6px; height:6px; border-radius:2px; flex-shrink:0; }
  .date-popup { min-width:210px; padding:.75rem; display:none; flex-direction:column; gap:.5rem; }
  .date-popup.open { display:flex; animation:popIn .1s ease; }
  .date-popup input[type="date"] { padding:5px 9px; font-family:'DM Sans',sans-serif; font-size:12px; border:1px solid var(--border-md); border-radius:var(--r); background:var(--surface2); color:var(--text); outline:none; width:100%; transition:all .1s; }
  .date-popup input[type="date"]:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accent-2); }
  .date-popup-actions { display:flex; gap:4px; justify-content:flex-end; }
  .date-popup-actions button { padding:4px 10px; font-size:11px; font-family:'DM Sans',sans-serif; border-radius:var(--r); cursor:pointer; border:1px solid var(--border-md); transition:all .1s; }
  .btn-date-cancel { background:transparent; color:var(--text-2); }
  .btn-date-cancel:hover { background:var(--surface2); }
  .btn-date-save { background:var(--navy); color:#fff; border-color:var(--navy); font-weight:600; }
  .btn-date-save:hover { background:var(--navy-3); }
  .btn-date-clear { background:transparent; color:var(--b-fg); border-color:transparent; margin-right:auto; }
  .btn-date-clear:hover { background:var(--b-bg); }

  /* MODAL */
  .opm-overlay { position:fixed; inset:0; background:rgba(8,13,31,0.45); z-index:600; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity .15s; }
  .opm-overlay.open { opacity:1; pointer-events:all; }
  .opm-modal { background:var(--surface); border-radius:var(--r-xl); width:100%; max-width:420px; box-shadow:var(--sh-lg); border:1px solid var(--border-md); transform:translateY(6px); transition:transform .15s; }
  .opm-overlay.open .opm-modal { transform:translateY(0); }
  .opm-modal-header { padding:.875rem 1.125rem .75rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .opm-modal-title { font-size:13px; font-weight:600; }
  .opm-modal-sub { font-size:10px; color:var(--text-3); margin-top:1px; }
  .opm-close { background:none; border:none; cursor:pointer; color:var(--text-3); font-size:14px; padding:3px 6px; border-radius:5px; transition:all .1s; line-height:1; }
  .opm-close:hover { background:var(--surface2); color:var(--text); }
  .opm-modal-body { padding:.875rem 1.125rem; }
  .opm-textarea { width:100%; min-height:88px; max-height:200px; padding:8px 10px; font-family:'DM Sans',sans-serif; font-size:12px; border:1px solid var(--border-md); border-radius:var(--r-md); background:var(--surface2); color:var(--text); outline:none; resize:vertical; line-height:1.55; transition:all .1s; }
  .opm-textarea:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accent-2); }
  .opm-modal-footer { padding:.625rem 1.125rem; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:5px; align-items:center; }
  .opm-char-count { font-size:10px; color:var(--text-3); margin-right:auto; font-family:'DM Mono',monospace; }
  .btn-opm-cancel { padding:5px 12px; font-size:12px; font-family:'DM Sans',sans-serif; border:1px solid var(--border-md); border-radius:var(--r); background:transparent; color:var(--text-2); cursor:pointer; transition:all .1s; }
  .btn-opm-cancel:hover { background:var(--surface2); }
  .btn-opm-save { padding:5px 14px; font-size:12px; font-family:'DM Sans',sans-serif; font-weight:600; border:none; border-radius:var(--r); background:var(--navy); color:#fff; cursor:pointer; transition:all .1s; }
  .btn-opm-save:hover { background:var(--navy-3); }

  /* TOAST */
  .toast { position:fixed; bottom:1.25rem; left:50%; transform:translateX(-50%) translateY(60px); background:var(--navy); color:#fff; border-radius:var(--r-lg); padding:.5rem 1rem; font-size:12px; font-weight:500; z-index:300; transition:transform .22s cubic-bezier(.34,1.56,.64,1); pointer-events:none; white-space:nowrap; display:flex; align-items:center; gap:6px; border:1px solid rgba(255,255,255,0.07); box-shadow:var(--sh-lg); }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { background:#006B47; }
  .toast.error   { background:#B81518; }
  .toast.info    { background:var(--accent); }

  /* SPINNER */
  .spinner { width:24px; height:24px; border:2px solid var(--border-md); border-top-color:var(--accent); border-radius:50%; animation:spin .55s linear infinite; margin:0 auto .875rem; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-box { text-align:center; padding:4rem; color:var(--text-3); font-size:13px; }

  @media(max-width:600px) { .main{padding:1rem;} .fase-section-body{grid-template-columns:1fr;} .project-info{grid-template-columns:1fr 1fr;} }

  /* ── DETAIL FILTERS ── */
  .detail-filter-bar {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
    padding:.5rem .875rem; margin-bottom:.875rem;
    display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;
  }
  .detail-search {
    flex:1; min-width:160px; padding:5px 10px; font-family:'DM Sans',sans-serif;
    font-size:12px; border:1px solid var(--border-md); border-radius:var(--r);
    background:var(--surface2); color:var(--text); outline:none; transition:all .1s;
  }
  .detail-search:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accent-2); }
  .detail-search::placeholder { color:var(--text-3); }
  .filter-status-btns { display:flex; gap:3px; flex-wrap:wrap; }
  .fsb {
    display:inline-flex; align-items:center; gap:3px; padding:3px 9px;
    font-size:10px; font-weight:600; border-radius:20px; cursor:pointer;
    border:1px solid var(--border-md); background:transparent; color:var(--text-2);
    font-family:'DM Sans',sans-serif; transition:all .1s; white-space:nowrap;
  }
  .fsb:hover { background:var(--surface2); }
  .fsb.active { border-color:currentColor; }
  .fsb.fsb-G.active { background:var(--g-bg); color:var(--g-fg); border-color:var(--g-fg); }
  .fsb.fsb-L.active { background:var(--l-bg); color:var(--l-fg); border-color:var(--l-fg); }
  .fsb.fsb-R.active { background:var(--r-bg); color:var(--r-fg); border-color:var(--r-fg); }
  .fsb.fsb-B.active { background:var(--b-bg); color:var(--b-fg); border-color:var(--b-fg); }
  .fsb.fsb-N.active { background:var(--n-bg); color:var(--n-fg); border-color:var(--n-fg); }
  .fsb-dot { width:6px; height:6px; border-radius:50%; }
  .detail-filter-count { font-size:10px; color:var(--text-3); font-family:'DM Mono',monospace; margin-left:auto; white-space:nowrap; }
  .toggle-empty { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--text-2); cursor:pointer; user-select:none; white-space:nowrap; }
  .toggle-empty input { accent-color:var(--accent); cursor:pointer; }

  /* hide fase sections when all fields filtered out */
  .fase-section.all-hidden { display:none; }
  .field-row.df-hidden { display:none; }


  /* ── FASE TABS ── */
  .detail-controls {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
    padding:.5rem .875rem; margin-bottom:.75rem; display:flex; flex-direction:column; gap:.5rem;
  }
  .detail-fase-row { display:flex; gap:3px; flex-wrap:wrap; align-items:center; }
  .detail-fase-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text-3); margin-right:4px; white-space:nowrap; }
  .dtab {
    padding:3px 11px; font-size:10px; font-weight:500; border:1px solid var(--border-md);
    border-radius:20px; background:transparent; color:var(--text-2); cursor:pointer;
    transition:all .1s; font-family:'DM Sans',sans-serif; white-space:nowrap;
  }
  .dtab:hover { background:var(--surface2); color:var(--text); border-color:var(--border-strong); }
  .dtab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
  .detail-filter-row { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
  .filter-status-btns { display:flex; gap:3px; flex-wrap:wrap; }

  /* ── EXPORT BUTTONS ── */
  .detail-export-row {
    display:flex; gap:.5rem; align-items:center; padding:.5rem .875rem;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
    margin-bottom:.75rem;
  }
  .export-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-3); margin-right:4px; }
  .btn-det-export {
    display:inline-flex; align-items:center; gap:4px; padding:4px 11px;
    font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600;
    border-radius:var(--r); cursor:pointer; border:1px solid var(--border-md); transition:all .1s;
  }
  .btn-det-export.csv  { background:var(--surface2); color:var(--text-2); }
  .btn-det-export.csv:hover  { background:var(--surface3); color:var(--text); }
  .btn-det-export.xlsx { background:var(--g-fg); color:#fff; border-color:var(--g-fg); }
  .btn-det-export.xlsx:hover { background:#00523A; }
  .export-fase-note { font-size:10px; color:var(--text-3); margin-left:auto; }

</style>
</head>
<body>

<header class="page-header">
  <div style="display:flex;align-items:center;gap:10px;min-width:0">
    <button class="btn-back-detail" onclick="goBack()" title="Terug naar dashboard">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Terug
    </button>
    <span style="color:rgba(255,255,255,0.2);font-size:12px">|</span>
    <span class="logo-icon" style="flex-shrink:0"><svg width="9" height="9" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="3.5" height="3.5" rx="1" fill="white"/><rect x="5.5" y="1" width="3.5" height="3.5" rx="1" fill="white" opacity=".55"/><rect x="1" y="5.5" width="3.5" height="3.5" rx="1" fill="white" opacity=".55"/><rect x="5.5" y="5.5" width="3.5" height="3.5" rx="1" fill="white" opacity=".28"/></svg></span>
    <div class="project-name" id="pageTitle" style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Project laden...</div>
  </div>
  <div style="display:flex;align-items:center;gap:.75rem;flex-shrink:0">
    <span class="meta" id="pageWP"></span>
    <button class="btn-back-detail" onclick="window.close()" title="Tabblad sluiten">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      Sluiten
    </button>
  </div>
</header>


<!-- Detail controls -->
<div class="detail-controls" id="detailControls" style="display:none">
  <div class="detail-fase-row">
    <span class="detail-fase-label">Fase</span>
    <button class="dtab active" onclick="setDetailFase('alle',this)">Alle fases</button>
    <button class="dtab" onclick="setDetailFase('Analyse',this)">Analyse</button>
    <button class="dtab" onclick="setDetailFase('VO-Fase',this)">VO-Fase</button>
    <button class="dtab" onclick="setDetailFase('DO-Fase',this)">DO-Fase</button>
    <button class="dtab" onclick="setDetailFase('Onderzoeksfase',this)">Onderzoeksfase</button>
    <button class="dtab" onclick="setDetailFase('UO-Fase',this)">UO-Fase</button>
    <button class="dtab" onclick="setDetailFase('Natuurtoets',this)">Natuurtoets</button>
    <button class="dtab" onclick="setDetailFase('Archeologie',this)">Archeologie</button>
    <button class="dtab" onclick="setDetailFase('Bodem',this)">Bodem</button>
    <button class="dtab" onclick="setDetailFase('NGE/OO',this)">NGE/OO</button>

function parseDatum(str) {
  if (!str||str==='?') return null; str=str.trim();
  var m=str.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if(m) return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  m=str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m) return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  return null;
}
function toInputDate(d) {
  if(!d) return '';
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function calcWeken(s) {
  var d=parseDatum(s); if(!d) return '';
  var today=new Date(); today.setHours(0,0,0,0);
  return String(Math.ceil((d-today)/(1000*60*60*24*7)));
}
function badgeCls(v) {
  if(v==='Gereed') return 'G'; if(v==='Loopt') return 'L';
  if(v==='Review') return 'R'; if(v==='Geblokkeerd') return 'B';
  if(v==='Nog te starten') return 'N'; return '';
}

// ══ STATE ══
var ROW_DATA    = null;  // array[174]
var ROW_IDX     = -1;
var DB_ROW      = null;
var OPMERKINGEN = {};
var currentMode = 'viewer';
var currentUser = '';
var isSaving    = false;
var pickerTarget = null;
var datePicker_target = null;
var opmTarget   = null;
var toastTimer  = null;

// ══ INIT ══
window.addEventListener('load', async function() {
  // Read params from sessionStorage (set by main page)
  var params = JSON.parse(sessionStorage.getItem('detail_params') || 'null');
  if (!params) {
    document.getElementById('mainContent').innerHTML = '<div class="loading-box">Geen projectdata gevonden. Open dit scherm via het dashboard.</div>';
    return;
  }
  ROW_IDX     = params.rowIdx;
  currentUser = params.user  || 'Onbekend';
  currentMode = params.mode  || 'viewer';

  await loadProject();
});

async function loadProject() {
  try {
    var data = await supa.get('/rest/v1/werkpakketten?row_idx=eq.'+ROW_IDX+'&select=*');
    if (!data || !data.length) throw new Error('Project niet gevonden');
    DB_ROW = data[0];
    ROW_DATA = new Array(174).fill('');
    var cd = DB_ROW.cel_data || {};
    Object.keys(cd).forEach(function(k){ ROW_DATA[parseInt(k)] = cd[k]||''; });

    // Load opmerkingen
    var opms = await supa.get('/rest/v1/opmerkingen?row_idx=eq.'+ROW_IDX+'&select=fase,tekst');
    opms.forEach(function(o){ OPMERKINGEN[ROW_IDX+'-'+o.fase] = o.tekst||''; });

    renderPage();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div class="loading-box" style="color:#b53030">Fout: '+esc(e.message)+'</div>';
  }
}


// ══ DETAIL PAGE FILTERS ══
var activeDetailStatus = {};
var currentDetailFase  = 'alle';

function setDetailFase(fase, btn) {
  currentDetailFase = fase;
  document.querySelectorAll('.dtab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  // Show/hide fase sections
  document.querySelectorAll('.fase-section').forEach(function(sec) {
    var secFase = sec.getAttribute('data-fase');
    if (fase === 'alle' || secFase === fase) {
      sec.style.display = '';
      // Auto-expand selected fase
      if (fase !== 'alle') {
        var body = sec.querySelector('.fase-section-body');
        var hdr  = sec.querySelector('.fase-section-header');
        if (body) body.classList.remove('collapsed');
        if (hdr)  hdr.classList.remove('collapsed');
      }
    } else {
      sec.style.display = 'none';
    }
  });

  // Update export note
  var note = document.getElementById('exportFaseNote');
  if (note) note.textContent = fase === 'alle' ? 'Alle fases' : fase;

  applyDetailFilters();
}

function toggleStatusFilter(status, btn) {
  if (activeDetailStatus[status]) {
    delete activeDetailStatus[status];
    btn.classList.remove('active');
  } else {
    activeDetailStatus[status] = true;
    btn.classList.add('active');
  }
  applyDetailFilters();
}

function applyDetailFilters() {
  var search    = (document.getElementById('detailSearch') ? document.getElementById('detailSearch').value : '').toLowerCase();
  var hideEmpty = document.getElementById('hideEmpty') ? document.getElementById('hideEmpty').checked : false;
  var hasStatusFilter = Object.keys(activeDetailStatus).length > 0;
  var totalVisible = 0;

  document.querySelectorAll('.field-row').forEach(function(row) {
    var label  = (row.getAttribute('data-label')  || '').toLowerCase();
    var val    = (row.getAttribute('data-val')    || '');
    var status = (row.getAttribute('data-status') || '');
    var secEl  = row.closest('.fase-section');
    var secFase = secEl ? secEl.getAttribute('data-fase') : '';

    // Skip rows in hidden fase sections
    if (currentDetailFase !== 'alle' && secFase !== currentDetailFase) return;

    var show = true;
    if (search && label.indexOf(search) < 0) show = false;
    if (show && hasStatusFilter && status && !activeDetailStatus[status]) show = false;
    if (show && hideEmpty && !val) show = false;

    row.classList.toggle('df-hidden', !show);
    if (show) totalVisible++;
  });

  // Update count
  var countEl = document.getElementById('detailFilterCount');
  if (countEl) countEl.textContent = totalVisible + ' velden';
}

// ══ EXPORT ══
function getDetailExportData() {
  var rows = [];

  // ── Projectinformatie bovenaan ──
  var infoFields = [
    [0,'Projectnummer intern'],[1,'Projectnummer extern'],[2,'Projectnaam'],
    [3,'APD Bouwdeel'],[4,'Liander Tracédeel'],[5,'WP nummer'],
    [6,'Tracé start'],[7,'Tracé eind'],[8,'Engineer'],
    [9,'Lengte nieuw (m)'],[10,'Lengte verwijderen (m)'],[11,'Overdracht VO aannemer']
  ];
  rows.push(['', '', '']); // lege scheidingsregel
  rows.push(['PROJECTINFORMATIE', '', '']);
  infoFields.forEach(function(f) {
    rows.push(['Projectinfo', f[1], ROW_DATA[f[0]] || '']);
  });
  rows.push(['', '', '']); // lege scheidingsregel

  // ── Fase velden ──
  document.querySelectorAll('.fase-section').forEach(function(sec) {
    if (sec.style.display === 'none') return;
    var fase = sec.getAttribute('data-fase') || '';
    var faseRows = [];
    sec.querySelectorAll('.field-row:not(.df-hidden)').forEach(function(row) {
      var label = row.querySelector('.field-label') ? row.querySelector('.field-label').textContent : '';
      var valEl = row.querySelector('.field-val');
      var val   = valEl ? valEl.textContent.trim() : '';
      faseRows.push([fase, label, val]);
    });
    if (faseRows.length) {
      rows.push([fase.toUpperCase(), '', '']);
      faseRows.forEach(function(r) { rows.push(r); });
      rows.push(['', '', '']);
    }
  });
  return rows;
}

function exportDetailCSV() {
  var naam = ROW_DATA[2] || 'project';
  var fase = currentDetailFase === 'alle' ? 'alle-fases' : currentDetailFase;
  var e2 = function(v) { return '"' + String(v).replace(/"/g,'""') + '"'; };
  var header = [e2('Fase'), e2('Veld'), e2('Waarde')].join(',');
  var data = getDetailExportData().map(function(r) { return r.map(e2).join(','); });
  var blob = new Blob(['﻿' + [header].concat(data).join('\r\n')], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = naam + '_' + fase + '_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
}

function exportDetailXLSX() {
  if (typeof XLSX === 'undefined') { showToast('Even wachten...','info'); return; }
  var naam = ROW_DATA[2] || 'project';
  var fase = currentDetailFase === 'alle' ? 'alle-fases' : currentDetailFase;
  var data = getDetailExportData();
  var wb = XLSX.utils.book_new();
  var wsData = [['Fase','Veld','Waarde']].concat(data);
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:22},{wch:38},{wch:28}];
  XLSX.utils.book_append_sheet(wb, ws, fase.substring(0,31));
  XLSX.writeFile(wb, naam + '_' + fase + '_' + new Date().toISOString().slice(0,10) + '.xlsx');
}


function renderPage() {
  var naam = ROW_DATA[2] || 'Onbekend project';
  var wp   = ROW_DATA[5] || '';
  var eng  = ROW_DATA[8] || '';
  document.title = naam + ' · TPA';
  document.getElementById('pageTitle').textContent = naam;
  document.getElementById('pageWP').textContent = wp + (eng ? ' — ' + eng : '');

  var appEl = document.getElementById('app-wrapper');
  if (appEl) appEl.className = currentMode === 'editor' ? 'mode-editor' : '';

  var html = '<div id="app-wrapper" class="'+(currentMode==='editor'?'mode-editor':'')+'">';

  // Mode bar
  html += '<div class="mode-bar">';
  html += '<span class="mode-label">Ingelogd als <b>'+esc(currentUser)+'</b></span>';
  html += '<span class="mode-pill '+currentMode+'"><span class="dot"></span>'+
    (currentMode==='viewer'?'Viewer':'Bewerker')+'</span>';
  html += '<span class="saving-indicator" id="savingIndicator"><span class="saving-dot"></span>opslaan...</span>';
  html += '</div>';

  // Project info
  html += '<div class="project-info">';
  var infoFields = [
    [2,'Projectnaam'],[3,'APD Bouwdeel'],[4,'Tracédeel'],[5,'WP nummer'],
    [6,'Tracé start'],[7,'Tracé eind'],[8,'Engineer'],[9,'Lengte nieuw (m)'],
    [10,'Lengte verwijderen (m)'],[11,'Overdracht VO aannemer']
  ];
  infoFields.forEach(function(f) {
    var val = ROW_DATA[f[0]] || '—';
    html += '<div class="info-item"><div class="info-label">'+esc(f[1])+'</div><div class="info-val">'+esc(val)+'</div></div>';
  });
  html += '</div>';

  // Phase sections
  var phases = ['Analyse','VO-Fase','DO-Fase','Onderzoeksfase','UO-Fase','Natuurtoets','Archeologie','Bodem','NGE/OO','Geotechnisch'];
  phases.forEach(function(fase) {
    var faseCols = COLS.filter(function(c){ return c.f === fase; });
    if (!faseCols.length) return;
    var fs = FASE_STYLE[fase] || {};

    html += '<div class="fase-section" data-fase="'+esc(fase)+'">';
    html += '<div class="fase-section-header" onclick="toggleSection(this)">';
    html += '<span class="fase-title" style="background:'+fs.bg+';color:'+fs.color+'">'+esc(fase)+'</span>';
    html += '<span class="collapse-icon">&#9660;</span>';
    html += '</div>';
    html += '<div class="fase-section-body">';

    faseCols.forEach(function(col) {
      var raw = ROW_DATA[col.i] || '';
      var bc  = badgeCls(raw);
      var isDate   = DATE_COL_INDICES.indexOf(col.i) >= 0;
      var isJaNee  = JANEE_COL_INDICES.indexOf(col.i) >= 0;
      var isVirt   = VIRT_COLS.indexOf(col.i) >= 0;
      var isWeek   = col.n.indexOf('Weken resterend') >= 0;
      var isFullW  = isVirt || col.n.length > 35;

      var valHtml;
      if (bc) {
        valHtml = '<span class="badge '+bc+'">'+esc(raw)+'</span>';
      } else if (isWeek && raw) {
        var wn = parseInt(raw);
        if (!isNaN(wn) && Math.abs(wn)<1000) {
          var wc = wn<0?'wk-over':wn<=4?'wk-warn':'wk-ok';
          valHtml = '<span class="'+wc+'">'+wn+'w</span>';
        } else { valHtml = esc(raw); }
      } else if (isDate && raw) {
        valHtml = '<span class="date-val">'+esc(raw)+'</span>';
      } else if (isJaNee) {
        var jc = raw==='Ja'?'janee-ja':raw==='Nee'?'janee-nee':'janee-leeg';
        valHtml = '<span class="'+jc+'">'+(raw||'—')+'</span>';
      } else if (isVirt) {
        var oKey = ROW_IDX+'-opm-'+col.i;
        var ot   = OPMERKINGEN[oKey]||'';
        valHtml = ot
          ? '<span class="opmerking-tekst" title="'+esc(ot)+'">'+esc(ot)+'</span>'
          : '<span class="opmerking-leeg">'+(currentMode==='editor'?'+ opmerking':'—')+'</span>';
      } else {
        valHtml = raw ? esc(raw) : '<span style="color:var(--text-faint)">—</span>';
      }

      // Click handler for editor
      var clickAttr = '';
      var editCls   = '';
      if (currentMode === 'editor') {
        if (bc) {
          clickAttr = ' onclick="openStatusPicker(event,'+col.i+')"';
          editCls   = ' editable';
        } else if (isDate) {
          clickAttr = ' onclick="openDatePicker(event,'+col.i+')"';
          editCls   = ' editable';
        } else if (isJaNee) {
          clickAttr = ' onclick="toggleJaNee(event,'+col.i+')"';
          editCls   = ' editable';
        } else if (isVirt) {
          clickAttr = ' onclick="openOpmModal(event,'+col.i+')"';
          editCls   = ' editable';
        }
      }

      var statusAttr = bc ? ' data-status="'+esc(raw)+'"' : '';
      var rawVal = raw || '';
      html += '<div class="field-row'+(isFullW?' full-width':'')+editCls+'" data-label="'+esc(col.n.toLowerCase())+'" data-val="'+esc(rawVal)+'"'+statusAttr+clickAttr+'>';
      html += '<span class="field-label" title="'+esc(col.n)+'">'+esc(col.n)+'</span>';
      html += '<span class="field-val">'+valHtml+'</span>';
      html += '</div>';
    });

    html += '</div></div>'; // fase-section-body + fase-section
  });

  html += '</div>'; // app-wrapper
  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('detailControls').style.display = 'flex';
  document.getElementById('detailExportRow').style.display = 'flex';
  applyDetailFilters();
}

function toggleSection(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
}

// ══ STATUS PICKER ══
function openStatusPicker(e, colIdx) {
  e.stopPropagation();
  pickerTarget = colIdx;
  var picker = document.getElementById('statusPicker');
  var cur = ROW_DATA[colIdx];
  picker.querySelectorAll('.status-option[data-val]').forEach(function(opt){
    opt.classList.toggle('active', opt.getAttribute('data-val')===cur);
  });
  positionPopup(picker, e, 170, 230);
  picker.classList.add('open');
  setTimeout(function(){ document.addEventListener('click', closePickerOutside, {once:true}); }, 0);
}
function closePickerOutside(e) {
  if (!document.getElementById('statusPicker').contains(e.target)) closeStatusPicker();
}
function closeStatusPicker() {
  document.getElementById('statusPicker').classList.remove('open');
  pickerTarget = null;
}
async function applyStatus(newVal) {
  if (pickerTarget === null) return;
  var ci  = pickerTarget;
  var old = ROW_DATA[ci];
  closeStatusPicker();
  if (newVal === old) return;
  ROW_DATA[ci] = newVal;
  renderPage();
  await saveCell(ci, newVal, old);
}

// ══ DATE PICKER ══
function openDatePicker(e, colIdx) {
  e.stopPropagation();
  datePicker_target = colIdx;
  var cur = ROW_DATA[colIdx];
  var d   = parseDatum(cur);
  document.getElementById('dateInput').value = d ? toInputDate(d) : '';
  var popup = document.getElementById('datePicker');
  positionPopup(popup, e, 240, 150);
  popup.classList.add('open');
  setTimeout(function(){ document.getElementById('dateInput').focus(); document.addEventListener('click', closeDateOutside, {once:true}); }, 50);
}
function closeDateOutside(e) {
  if (!document.getElementById('datePicker').contains(e.target)) closeDatePicker();
}
function closeDatePicker() { document.getElementById('datePicker').classList.remove('open'); datePicker_target=null; }
function clearDate()  { applyDate(''); }
function saveDate()   {
  var v = document.getElementById('dateInput').value;
  if (!v) { applyDate(''); return; }
  var p = v.split('-');
  applyDate(p[2]+'-'+p[1]+'-'+p[0]);
}
async function applyDate(newDateStr) {
  if (datePicker_target === null) return;
  var ci   = datePicker_target;
  var old  = ROW_DATA[ci];
  closeDatePicker();
  var updates = {};
  updates[ci] = newDateStr;
  DATE_WEEK_PAIRS.forEach(function(pair){
    if (pair[0]===ci) updates[pair[1]] = newDateStr ? calcWeken(newDateStr) : '';
  });
  var oldVals = {};
  Object.keys(updates).forEach(function(k){ oldVals[k]=ROW_DATA[parseInt(k)]; ROW_DATA[parseInt(k)]=updates[k]; });
  renderPage();
  await saveCells(updates, oldVals);
}

// ══ JA/NEE TOGGLE ══
async function toggleJaNee(e, colIdx) {
  e.stopPropagation();
  var old = ROW_DATA[colIdx];
  var nw  = old==='Ja'?'Nee':'Ja';
  ROW_DATA[colIdx] = nw;
  renderPage();
  await saveCell(colIdx, nw, old);
}

// ══ OPMERKING ══
function openOpmModal(e, virtColIdx) {
  e.stopPropagation();
  opmTarget = virtColIdx;
  var tekst = OPMERKINGEN[ROW_IDX+'-opm-'+virtColIdx]||'';
  document.getElementById('opmTextarea').value = tekst;
  document.getElementById('opmModalSub').textContent = OPM_SUB_LABELS[virtColIdx]||'';
  updateOpmCount();
  document.getElementById('opmOverlay').classList.add('open');
  setTimeout(function(){ document.getElementById('opmTextarea').focus(); },100);
}
function closeOpmModal() { document.getElementById('opmOverlay').classList.remove('open'); opmTarget=null; }
function updateOpmCount() { document.getElementById('opmCharCount').textContent=document.getElementById('opmTextarea').value.length+' / 500'; }
async function saveOpmerking() {
  if (opmTarget===null) return;
  var vci   = opmTarget;
  var tekst = document.getElementById('opmTextarea').value.trim();
  closeOpmModal();
  var key = ROW_IDX+'-opm-'+vci;
  OPMERKINGEN[key] = tekst;
  renderPage();
  showSaving(true);
  try {
    var existing = await supa.get('/rest/v1/opmerkingen?row_idx=eq.'+ROW_IDX+'&fase=eq.opm-'+vci+'&select=id');
    if (existing && existing.length) {
      await supa.patch('/rest/v1/opmerkingen?row_idx=eq.'+ROW_IDX+'&fase=eq.opm-'+vci,
        {tekst:tekst,updated_by:currentUser,updated_at:new Date().toISOString()});
    } else {
      await supa.post('/rest/v1/opmerkingen',{row_idx:ROW_IDX,fase:'opm-'+vci,tekst:tekst,updated_by:currentUser,updated_at:new Date().toISOString()});
    }
    showToast('&#10003; Opmerking opgeslagen','success');
  } catch(err) {
    showToast('&#10007; '+err.message,'error');
  } finally { showSaving(false); }
}

// ══ SAVE HELPERS ══
async function saveCell(ci, newVal, oldVal) {
  showSaving(true);
  try {
    var cd = Object.assign({}, DB_ROW.cel_data||{});
    if (newVal) cd[String(ci)]=newVal; else delete cd[String(ci)];
    await supa.patch('/rest/v1/werkpakketten?row_idx=eq.'+ROW_IDX,
      {cel_data:cd,updated_by:currentUser,updated_at:new Date().toISOString()});
    DB_ROW.cel_data = cd;
    showToast('&#10003; Opgeslagen','success');
  } catch(err) {
    ROW_DATA[ci] = oldVal; renderPage();
    showToast('&#10007; '+err.message,'error');
  } finally { showSaving(false); }
}
async function saveCells(updates, oldVals) {
  showSaving(true);
  try {
    var cd = Object.assign({}, DB_ROW.cel_data||{});
    Object.keys(updates).forEach(function(k){ if(updates[k]) cd[k]=updates[k]; else delete cd[k]; });
    await supa.patch('/rest/v1/werkpakketten?row_idx=eq.'+ROW_IDX,
      {cel_data:cd,updated_by:currentUser,updated_at:new Date().toISOString()});
    DB_ROW.cel_data = cd;
    showToast('&#10003; Opgeslagen','success');
  } catch(err) {
    Object.keys(oldVals).forEach(function(k){ ROW_DATA[parseInt(k)]=oldVals[k]; });
    renderPage();
    showToast('&#10007; '+err.message,'error');
  } finally { showSaving(false); }
}

function showSaving(on) {
  isSaving = on;
  var el = document.getElementById('savingIndicator');
  if (el) el.classList.toggle('show', on);
}

// ══ UTILS ══
function positionPopup(el, e, w, h) {
  var rect = e.currentTarget.getBoundingClientRect();
  var left = rect.left, top = rect.bottom+6;
  if (left+w > window.innerWidth)  left = window.innerWidth-w-5;
  if (top +h > window.innerHeight) top  = rect.top-h-6;
  el.style.top=top+'px'; el.style.left=left+'px';
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.innerHTML=msg; t.className='toast '+(type||'')+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.className='toast '+(type||''); },2500);
}
